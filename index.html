<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Portfolio</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">My Portfolio</div>
            <button id="menu-toggle">Menu</button>
            <ul id="nav-links" class="hidden">
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="about">
            <h1>About Me</h1>
            <p>Welcome to my portfolio!</p>
        </section>
        <section id="projects">
            <h2>Projects</h2>
            <div class="project" data-filter="web">Web Project Example</div>
            <div class="project" data-filter="mobile">Mobile Project Example</div>
        </section>
        <section id="contact">
            <h2>Contact Me</h2>
            <form id="contact-form">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 My Portfolio</p>
    </footer>
    <script src="script.js"></script>
    <script>
    // Mobile menu toggle
    document.getElementById('menu-toggle').addEventListener('click', function() {
        var navLinks = document.getElementById('nav-links');
        navLinks.classList.toggle('hidden');
    });

    // Theme toggle
    var toggleTheme = document.getElementById('theme-toggle');
    toggleTheme.addEventListener('click', function() {
        document.body.classList.toggle('dark-theme');
    });

    // Contact form functionality
    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('Message sent!');
        // Add actual form submission logic here
    });

    // Skill bar animations
    window.onload = function() {
        var skillBars = document.querySelectorAll('.skill-bar');
        skillBars.forEach(function(bar) {
            var percentage = bar.getAttribute('data-percentage');
            bar.style.width = percentage + '%';
        });
    };

    // Project filtering
    var projectFilters = document.querySelectorAll('.project');
    projectFilters.forEach(function(filter) {
        filter.addEventListener('click', function() {
            var filterValue = this.getAttribute('data-filter');
            // Add filtering logic here
        });
    });
    </script>
</body>
</html>
